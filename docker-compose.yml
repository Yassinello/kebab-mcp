# Root docker-compose.yml — single-replica starter (Phase 39 / HOST-02).
#
# JC-1: default persistence is filesystem KV via ./data mount. Works
# out-of-the-box with no external secrets. For N-replica + Upstash, see
# docs/examples/docker-compose.multi.yml.
#
# Boot:
#   cp .env.example .env   # fill in MCP_AUTH_TOKEN at minimum
#   docker compose up -d
#
# Verify:
#   curl -sf http://localhost:3000/api/health
services:
  kebab-mcp:
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    # JC-2: wrapper defaults to a 5s drain — stop_grace_period must
    # exceed it so Docker does not SIGKILL before the wrapper exits.
    stop_grace_period: 10s
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
